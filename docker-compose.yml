version: "3.9"
services:
  cpp-kg:
    build: .
    volumes:
      - ./data:/app/data
      - ./scripts:/app/scripts
      - ./validation:/app/validation
    environment:
      - OLLAMA_HOST=http://ollama:11434
    depends_on:
      - ollama

  ollama:
    image: ollama/ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

volumes:
  ollama_data:
